<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tejas Goyal — Finance · Business Operations · Strategy</title>
<meta name="description" content="Entrepreneurship student and operator who's launched, priced, and run six ventures with real money on the table.">
<style>
  :root {
    --bg: #fafaf8;
    --surface: #ffffff;
    --ink: #1c1c1c;
    --muted: #666666;
    --accent: #3e5c76;
    --accent-soft: #eaeff4;
    --border: #e7e5df;

    --font-display: Georgia, "Iowan Old Style", "Palatino Linotype", serif;
    --font-body: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    --font-mono: ui-monospace, "SF Mono", "Cascadia Code", Menlo, Consolas, monospace;
  }

  html.dark {
    --bg: #16181c;
    --surface: #1e2126;
    --ink: #ededea;
    --muted: #9a9a93;
    --accent: #8aa3c2;
    --accent-soft: #262b33;
    --border: #2a2d33;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; border-color: var(--border); }
  html { scroll-behavior: smooth; }
  body {
    background: var(--bg);
    color: var(--ink);
    font-family: var(--font-body);
    transition: background 0.3s ease, color 0.3s ease;
    min-height: 100vh;
  }
  a { color: inherit; text-decoration: none; }
  ul { list-style: none; }
  img { max-width: 100%; display: block; }

  h1, h2, h3, h4, .font-display {
    font-family: var(--font-display);
    letter-spacing: -0.02em;
    font-weight: 400;
  }
  .font-mono-num { font-family: var(--font-mono); font-variant-numeric: tabular-nums; }

  ::selection { background: var(--accent); color: var(--surface); }

  .max-w-6xl { max-width: 72rem; margin: 0 auto; padding: 0 1.5rem; }
  .max-w-5xl { max-width: 64rem; margin: 0 auto; padding: 0 1.5rem; }
  .max-w-3xl { max-width: 48rem; margin: 0 auto; padding: 0 1.5rem; }

  /* Nav */
  header {
    position: sticky; top: 0; z-index: 40; width: 100%;
    transition: background-color 0.3s, border-color 0.3s;
    border-bottom: 1px solid transparent;
  }
  header.scrolled {
    background: color-mix(in srgb, var(--bg) 90%, transparent);
    backdrop-filter: blur(8px);
    border-bottom: 1px solid var(--border);
  }
  nav.navbar {
    max-width: 72rem; margin: 0 auto; padding: 1rem 1.5rem;
    display: flex; align-items: center; justify-content: space-between;
  }
  .brand { font-family: var(--font-display); font-size: 1.125rem; }
  .nav-links { display: none; align-items: center; gap: 1.75rem; }
  .nav-links a {
    font-size: 0.875rem; color: var(--muted); position: relative; padding-bottom: 0.25rem;
    transition: color 0.2s; cursor: pointer; background: none; border: none; font-family: var(--font-body);
  }
  .nav-links a:hover { color: var(--ink); }
  .nav-links a.active { color: var(--ink); }
  .nav-links a.active::after {
    content: ""; position: absolute; bottom: -1px; left: 0; right: 0; height: 1.5px; background: var(--accent);
  }
  .theme-toggle {
    border-radius: 999px; padding: 0.5rem; color: var(--muted); background: none; border: none; cursor: pointer;
    display: inline-flex; align-items: center; justify-content: center; transition: color 0.2s, background 0.2s;
  }
  .theme-toggle:hover { color: var(--ink); background: var(--accent-soft); }
  .menu-toggle { display: inline-flex; padding: 0.5rem; background: none; border: none; color: var(--ink); cursor: pointer; }
  .mobile-menu {
    display: none; border-top: 1px solid var(--border); background: var(--bg);
    padding: 1rem 1.5rem 1.25rem; flex-direction: column; gap: 1rem;
  }
  .mobile-menu.open { display: flex; }
  .mobile-menu a { font-size: 0.875rem; color: var(--muted); background: none; border: none; text-align: left; cursor: pointer; font-family: var(--font-body); }
  .mobile-menu a.active { color: var(--ink); }
  .mobile-menu .mtheme { display: flex; align-items: center; gap: 0.5rem; color: var(--muted); }

  @media (min-width: 768px) {
    .nav-links { display: flex; }
    .menu-toggle { display: none; }
    .mobile-menu { display: none !important; }
  }

  /* Buttons / pills */
  .btn {
    display: inline-flex; align-items: center; gap: 0.5rem; border-radius: 999px;
    padding: 0.6rem 1.25rem; font-size: 0.875rem; font-weight: 500; transition: all 0.2s;
    cursor: pointer; border: none; font-family: var(--font-body);
  }
  .btn-primary { background: var(--ink); color: var(--bg); }
  .btn-primary:hover { opacity: 0.85; }
  .btn-secondary { border: 1px solid var(--border); color: var(--ink); background: transparent; }
  .btn-secondary:hover { border-color: var(--accent); color: var(--accent); }
  .btn-ghost { color: var(--ink); background: transparent; }
  .btn-ghost:hover { color: var(--accent); }

  .pill {
    display: inline-flex; align-items: center; border-radius: 999px; background: var(--accent-soft);
    color: var(--ink); padding: 0.25rem 0.75rem; font-size: 0.75rem; font-weight: 500;
  }

  .eyebrow {
    font-family: var(--font-mono); font-size: 0.75rem; text-transform: uppercase;
    letter-spacing: 0.18em; color: var(--accent); margin-bottom: 0.75rem;
  }

  .card {
    border-radius: 1rem; border: 1px solid var(--border); background: var(--surface);
  }

  .ledger-rule { position: relative; }
  .ledger-rule::after {
    content: ""; position: absolute; left: 0; bottom: -2px; height: 1px; width: 100%; background: var(--border);
  }

  /* fade in — scroll triggered */
  .fade-in {
    opacity: 0; transform: translateY(22px);
    transition: opacity 0.7s cubic-bezier(.16,.8,.28,1), transform 0.7s cubic-bezier(.16,.8,.28,1);
    will-change: opacity, transform;
  }
  .fade-in.visible { opacity: 1; transform: translateY(0); }

  /* page transition */
  #app { transition: opacity 0.22s ease; }
  #app.page-leaving { opacity: 0; }

  /* animated underline sweep on nav */
  .nav-links a::before {
    content: ""; position: absolute; bottom: -1px; left: 0; right: 0; height: 1.5px;
    background: var(--accent); transform: scaleX(0); transform-origin: left; transition: transform 0.3s ease;
  }
  .nav-links a:hover::before { transform: scaleX(1); }
  .nav-links a.active::before { display: none; }

  /* button micro-interaction */
  .btn { position: relative; overflow: hidden; }
  .btn-primary:active, .btn-secondary:active, .btn-ghost:active { transform: scale(0.97); }

  /* card tilt/glow interactivity */
  .project-card, .lead-card, .exp-card {
    position: relative;
    transition: transform 0.35s cubic-bezier(.16,.8,.28,1), box-shadow 0.35s ease, border-color 0.35s ease;
  }
  .project-card::before, .lead-card::before {
    content: ""; position: absolute; inset: 0; border-radius: inherit; pointer-events: none; opacity: 0;
    background: radial-gradient(220px circle at var(--mx,50%) var(--my,50%), color-mix(in srgb, var(--accent) 14%, transparent), transparent 70%);
    transition: opacity 0.4s ease; z-index: 1;
  }
  .project-card:hover::before, .lead-card:hover::before { opacity: 1; }
  .project-card:hover, .lead-card:hover { border-color: color-mix(in srgb, var(--accent) 40%, var(--border)); }

  .project-cover span { transition: transform 0.5s cubic-bezier(.16,.8,.28,1), opacity 0.5s ease; }
  .project-card:hover .project-cover span { transform: scale(1.12) rotate(-3deg); opacity: 0.4; }

  .project-cover-pdf { background: var(--surface); }
  .cover-pdf-embed { width: 100%; height: 100%; border: none; pointer-events: none; }
  .cover-pdf-shield { position: absolute; inset: 0; background: transparent; }

  .explore-item, .channel { position: relative; overflow: hidden; }
  .explore-item::after, .channel::after {
    content: ""; position: absolute; left: 0; top: 0; bottom: 0; width: 3px; background: var(--accent);
    transform: scaleY(0); transform-origin: bottom; transition: transform 0.35s cubic-bezier(.16,.8,.28,1);
  }
  .explore-item:hover::after, .channel:hover::after { transform: scaleY(1); }

  .timeline-entry .dot { transition: transform 0.3s ease, box-shadow 0.3s ease; }
  .timeline-entry:hover .dot { transform: scale(1.5); box-shadow: 0 0 0 4px color-mix(in srgb, var(--accent) 20%, transparent); }

  .ledger-item { transition: background 0.3s ease; }
  .ledger-item:hover { background: color-mix(in srgb, var(--accent-soft) 60%, transparent); }

  .brand { display: inline-block; transition: transform 0.3s ease; }
  .brand:hover { transform: translateY(-1px); }

  .theme-toggle svg { transition: transform 0.4s cubic-bezier(.34,1.56,.64,1); }
  .theme-toggle:hover svg { transform: rotate(24deg) scale(1.1); }

  @media (prefers-reduced-motion: reduce) {
    .fade-in, .fade-in.visible, .project-card, .lead-card, .exp-card, #app { transition: none !important; }
  }

  /* Page sections */
  .page { display: none; }
  .page.visible { display: block; }

  .section { padding: 5rem 0; }
  .section-tight { padding-top: 4rem; padding-bottom: 3rem; }
  .border-top { border-top: 1px solid var(--border); }
  .border-y { border-top: 1px solid var(--border); border-bottom: 1px solid var(--border); }

  /* Hero */
  .hero { padding: 5rem 0 5rem; }
  @media (min-width: 640px) { .hero { padding: 7rem 0 7rem; } }
  .hero h1 { font-size: 2.5rem; max-width: 48rem; line-height: 1.08; margin-bottom: 1.5rem; }
  @media (min-width: 640px) { .hero h1 { font-size: 3rem; } }
  @media (min-width: 768px) { .hero h1 { font-size: 3.75rem; } }
  .hero p.subhead { color: var(--muted); font-size: 1.125rem; max-width: 36rem; line-height: 1.6; margin-bottom: 2.5rem; }
  .hero-actions { display: flex; flex-wrap: wrap; align-items: center; gap: 1rem; }

  /* Ledger stats */
  .ledger-grid { display: grid; grid-template-columns: 1fr; }
  @media (min-width: 640px) { .ledger-grid { grid-template-columns: repeat(4, 1fr); } }
  .ledger-item { padding: 2rem 0; border-bottom: 1px solid var(--border); }
  .ledger-grid > .ledger-item:last-child { border-bottom: none; }
  @media (min-width: 640px) {
    .ledger-item { padding: 2rem 1.5rem; border-bottom: none; border-left: 1px solid var(--border); }
    .ledger-grid > .ledger-item:first-child { border-left: none; padding-left: 0; }
    .ledger-grid > .ledger-item:last-child { padding-right: 0; }
  }
  .ledger-item .entry-no { font-size: 0.75rem; color: var(--muted); margin-bottom: 0.5rem; }
  .ledger-item .entry-value { font-size: 1.875rem; margin-bottom: 0.25rem; }
  .ledger-item .entry-sub { font-size: 0.875rem; color: var(--muted); }
  .ledger-item .entry-label { font-size: 11px; color: var(--muted); margin-top: 0.75rem; text-transform: uppercase; letter-spacing: 0.02em; }

  /* Currently */
  .currently-grid { display: grid; grid-template-columns: 1fr; gap: 2rem; }
  @media (min-width: 640px) { .currently-grid { grid-template-columns: 1fr 2fr; gap: 4rem; } }
  .currently-grid .focus-text { font-size: 1.5rem; line-height: 1.4; }
  @media (min-width: 640px) { .currently-grid .focus-text { font-size: 1.875rem; } }

  /* Section heading */
  .section-heading { margin-bottom: 3rem; }
  .section-heading h2 { font-size: 1.875rem; margin-bottom: 1rem; }
  @media (min-width: 640px) { .section-heading h2 { font-size: 2.25rem; } }
  .section-heading p { color: var(--muted); font-size: 1rem; line-height: 1.6; }

  /* Project grid */
  .project-grid { display: grid; grid-template-columns: 1fr; gap: 1.5rem; }
  @media (min-width: 640px) { .project-grid { grid-template-columns: repeat(2, 1fr); } }
  @media (min-width: 1024px) { .project-grid { grid-template-columns: repeat(3, 1fr); } }

  .project-card {
    display: block; border-radius: 1rem; border: 1px solid var(--border); background: var(--surface);
    overflow: hidden; transition: all 0.3s; cursor: pointer;
  }
  .project-card:hover { transform: translateY(-4px); box-shadow: 0 20px 40px -24px rgba(0,0,0,0.15); }
  .project-cover {
    aspect-ratio: 4/3; width: 100%; background: var(--accent-soft); display: flex; align-items: center;
    justify-content: center; position: relative; overflow: hidden;
  }
  .project-cover span { font-family: var(--font-display); font-size: 3.75rem; color: var(--accent); opacity: 0.25; }
  .project-body { padding: 1.5rem; }
  .project-body .cat { font-family: var(--font-mono); font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.02em; color: var(--accent); margin-bottom: 0.5rem; }
  .project-body h3 { font-size: 1.25rem; margin-bottom: 0.5rem; display: flex; align-items: center; gap: 0.375rem; }
  .project-body .desc { font-size: 0.875rem; color: var(--muted); line-height: 1.6; margin-bottom: 1rem; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
  .project-body .pills { display: flex; flex-wrap: wrap; gap: 0.5rem; }

  /* Explore grid */
  .explore-grid {
    display: grid; grid-template-columns: 1fr; gap: 1px; background: var(--border);
    border-radius: 1rem; overflow: hidden; border: 1px solid var(--border);
  }
  @media (min-width: 640px) { .explore-grid { grid-template-columns: repeat(2, 1fr); } }
  .explore-item {
    background: var(--surface); padding: 2rem; display: flex; align-items: center; justify-content: space-between;
    transition: background 0.2s; cursor: pointer;
  }
  .explore-item:hover { background: var(--accent-soft); }
  .explore-item h3 { font-size: 1.25rem; margin-bottom: 0.25rem; }
  .explore-item p { font-size: 0.875rem; color: var(--muted); }
  .explore-item .arrow { color: var(--muted); transition: all 0.3s; flex-shrink: 0; margin-left: 1rem; }
  .explore-item:hover .arrow { color: var(--accent); transform: translate(4px, -4px); }

  /* Page hero */
  .page-hero { padding: 4rem 0 3rem; }
  @media (min-width: 640px) { .page-hero { padding: 6rem 0 4rem; } }
  .page-hero h1 { font-size: 2.5rem; max-width: 48rem; line-height: 1.08; margin-bottom: 1.5rem; }
  @media (min-width: 640px) { .page-hero h1 { font-size: 3rem; } }
  @media (min-width: 768px) { .page-hero h1 { font-size: 3.75rem; } }
  .page-hero p { color: var(--muted); font-size: 1.125rem; max-width: 36rem; line-height: 1.6; }

  /* About */
  .about-grid { display: grid; grid-template-columns: 1fr; gap: 4rem; padding-bottom: 5rem; }
  @media (min-width: 1024px) { .about-grid { grid-template-columns: 1.4fr 1fr; } }
  .about-narrative > div { margin-bottom: 2.5rem; }
  .about-narrative p.body-text { font-size: 1.125rem; line-height: 1.7; }
  .about-narrative ul li { display: flex; align-items: baseline; gap: 0.75rem; margin-bottom: 0.75rem; }
  .about-narrative ul li .num { font-family: var(--font-mono); font-size: 0.75rem; color: var(--muted); }
  .about-narrative ul li .val { padding-bottom: 0.25rem; width: 100%; }
  .about-side { display: flex; flex-direction: column; gap: 2rem; }
  .about-side .card { padding: 1.5rem; }
  .about-side .card .eyebrow { margin-bottom: 1.25rem; }
  .fact-row { display: flex; flex-direction: column; gap: 0.125rem; padding-bottom: 1rem; margin-bottom: 1rem; border-bottom: 1px solid var(--border); }
  .fact-row:last-child { border-bottom: none; padding-bottom: 0; margin-bottom: 0; }
  .fact-row dt { font-size: 0.75rem; color: var(--muted); }
  .fact-row dd { font-size: 0.875rem; font-weight: 500; }
  .skill-group { margin-bottom: 1.25rem; }
  .skill-group:last-child { margin-bottom: 0; }
  .skill-group > p { font-size: 0.75rem; color: var(--muted); margin-bottom: 0.5rem; }
  .skill-group .pills { display: flex; flex-wrap: wrap; gap: 0.5rem; }

  /* Experience */
  .exp-list { display: flex; flex-direction: column; gap: 1.5rem; padding-bottom: 6rem; }
  .exp-card {
    display: grid; grid-template-columns: 1fr; gap: 1.5rem; border-radius: 1rem; border: 1px solid var(--border);
    background: var(--surface); padding: 2rem; transition: box-shadow 0.3s;
  }
  .exp-card:hover { box-shadow: 0 20px 40px -28px rgba(0,0,0,0.15); }
  @media (min-width: 768px) { .exp-card { grid-template-columns: 1fr 1.4fr; gap: 3rem; } }
  .exp-card .duration { font-family: var(--font-mono); font-size: 0.75rem; color: var(--muted); margin-bottom: 0.5rem; }
  .exp-card h3 { font-size: 1.5rem; margin-bottom: 0.25rem; }
  .exp-card .org { color: var(--accent); font-size: 0.875rem; font-weight: 500; margin-bottom: 1.25rem; }
  .exp-card .pills { display: flex; flex-wrap: wrap; gap: 0.5rem; }
  .exp-card .desc { line-height: 1.6; margin-bottom: 1.25rem; }
  .exp-card .outcomes-label { font-family: var(--font-mono); font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.02em; color: var(--muted); margin-bottom: 0.75rem; }
  .exp-card .outcomes li { display: flex; gap: 0.75rem; font-size: 0.875rem; margin-bottom: 0.5rem; }
  .exp-card .outcomes li .dash { color: var(--accent); }

  /* Lead card styles retained for possible reuse */
  .lead-card {
    height: 100%; border-radius: 1rem; border: 1px solid var(--border); background: var(--surface);
    padding: 2rem; display: flex; flex-direction: column; transition: all 0.3s;
  }
  .lead-card:hover { transform: translateY(-4px); box-shadow: 0 20px 40px -28px rgba(0,0,0,0.15); }
  .lead-card .duration { font-family: var(--font-mono); font-size: 0.75rem; color: var(--muted); margin-bottom: 0.5rem; }
  .lead-card h3 { font-size: 1.5rem; margin-bottom: 0.25rem; }
  .lead-card .org { color: var(--accent); font-size: 0.875rem; font-weight: 500; margin-bottom: 1.5rem; }
  .lead-card dl > div { margin-bottom: 1rem; }
  .lead-card dl > div.learnings { padding-top: 0.75rem; border-top: 1px solid var(--border); }
  .lead-card dt { color: var(--muted); font-size: 0.75rem; margin-bottom: 0.25rem; }
  .lead-card dd { font-size: 0.875rem; }

  /* Timeline */
  .timeline-wrap { max-width: 48rem; margin: 0 auto; padding: 0 1.5rem 6rem; }
  .timeline-list { position: relative; border-left: 1px solid var(--border); padding-left: 2rem; display: flex; flex-direction: column; gap: 2.5rem; }
  .timeline-entry { position: relative; }
  .timeline-entry .dot { position: absolute; left: -2.375rem; top: 0.375rem; height: 0.625rem; width: 0.625rem; border-radius: 999px; background: var(--accent); }
  .timeline-entry .year { font-family: var(--font-mono); font-size: 0.75rem; color: var(--muted); margin-bottom: 0.25rem; }
  .timeline-entry .cat { font-family: var(--font-mono); font-size: 11px; text-transform: uppercase; letter-spacing: 0.02em; margin-bottom: 0.5rem; }
  .timeline-entry h3 { font-size: 1.25rem; margin-bottom: 0.375rem; }
  .timeline-entry .detail { font-size: 0.875rem; color: var(--muted); line-height: 1.6; }

  /* Resume */
  .resume-grid { display: grid; grid-template-columns: 1fr; gap: 3rem; padding-bottom: 6rem; }
  @media (min-width: 1024px) { .resume-grid { grid-template-columns: 1.1fr 1fr; } }
  .resume-preview-card { border-radius: 1rem; border: 1px solid var(--border); background: var(--surface); padding: 2rem; }
  .resume-preview-box {
    aspect-ratio: 8.5/11; width: 100%; border-radius: 0.5rem; border: 1px solid var(--border);
    background: var(--accent-soft); display: flex; align-items: center; justify-content: center; margin-bottom: 1.5rem;
    overflow: hidden;
  }
  .resume-preview-box embed, .resume-preview-box iframe { width: 100%; height: 100%; border: none; }
  .resume-side > div { margin-bottom: 2.5rem; }
  .edu-row { display: flex; justify-content: space-between; align-items: baseline; gap: 1rem; padding-bottom: 1rem; margin-bottom: 1rem; border-bottom: 1px solid var(--border); }
  .edu-row:last-child { border-bottom: none; margin-bottom: 0; padding-bottom: 0; }
  .edu-row .course { font-size: 0.875rem; font-weight: 500; }
  .edu-row .inst { font-size: 0.75rem; color: var(--muted); }
  .edu-row .right { text-align: right; flex-shrink: 0; }
  .edu-row .yr { font-family: var(--font-mono); font-size: 0.75rem; color: var(--muted); }
  .edu-row .score { font-family: var(--font-mono); font-size: 0.75rem; color: var(--accent); }

  .resume-bottom-grid { display: grid; grid-template-columns: 1fr; gap: 3rem; padding-bottom: 6rem; border-top: 1px solid var(--border); padding-top: 4rem; }
  @media (min-width: 768px) { .resume-bottom-grid { grid-template-columns: repeat(2, 1fr); } }
  .achieve-item, .extra-item { padding-bottom: 1.25rem; margin-bottom: 1.25rem; border-bottom: 1px solid var(--border); }
  .achieve-item:last-child, .extra-item:last-child { border-bottom: none; margin-bottom: 0; padding-bottom: 0; }
  .achieve-item .top { display: flex; justify-content: space-between; align-items: baseline; gap: 0.75rem; margin-bottom: 0.25rem; }
  .achieve-item .title, .extra-item .title { font-size: 0.875rem; font-weight: 500; }
  .achieve-item .yr { font-family: var(--font-mono); font-size: 0.75rem; color: var(--muted); flex-shrink: 0; }
  .achieve-item .d, .extra-item .d { font-size: 0.75rem; color: var(--muted); }
  .extra-item .title { margin-bottom: 0.25rem; }

  /* Contact */
  .contact-card { border-radius: 1rem; border: 1px solid var(--border); background: var(--surface); }
  .contact-card > a { border-bottom: 1px solid var(--border); }
  .contact-card > a:last-child { border-bottom: none; }
  .channel { display: flex; align-items: center; justify-content: space-between; padding: 1.5rem; transition: background 0.2s; }
  .channel:hover { background: var(--accent-soft); }
  .channel-left { display: flex; align-items: center; gap: 1rem; }

function applyThemeIcon(){
  const isDark = document.documentElement.classList.contains("dark");
  document.getElementById("themeToggleDesktop").innerHTML = isDark ? ICONS.sun : ICONS.moon;
  document.getElementById("mThemeIcon").innerHTML = isDark ? ICONS.sun : ICONS.moon;
}
function toggleTheme(){
  document.documentElement.classList.toggle("dark");
  try{ localStorage.setItem("tg-theme", document.documentElement.classList.contains("dark") ? "dark" : "light"); }catch(e){}
  applyThemeIcon();
}
(function initTheme(){
  let saved = null;
  try{ saved = localStorage.getItem("tg-theme"); }catch(e){}
  if (saved === "dark" || (!saved && window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
    document.documentElement.classList.add("dark");
  }
})();

let revealObserver = null;
function initReveal(){
  if (revealObserver) revealObserver.disconnect();
  revealObserver = new IntersectionObserver((entries)=>{
    entries.forEach(entry=>{
      if (entry.isIntersecting){
        entry.target.classList.add("visible");
        revealObserver.unobserve(entry.target);
      }
    });
  }, { threshold: 0.12, rootMargin: "0px 0px -40px 0px" });
  document.querySelectorAll("#app .fade-in").forEach(el=>revealObserver.observe(el));
}

function initCountUp(){
  const els = document.querySelectorAll(".count-up");
  if (!els.length) return;
  const countObserver = new IntersectionObserver((entries)=>{
    entries.forEach(entry=>{
      if (!entry.isIntersecting) return;
      const el = entry.target;
      countObserver.unobserve(el);
      const target = el.dataset.target || "";
      const m = target.match(/^([^\d]*)([\d.]+)(.*)$/);
      if (!m){ el.textContent = target; return; }
      const [, prefix, numStr, suffix] = m;
      const decimals = (numStr.split(".")[1] || "").length;
      const end = parseFloat(numStr);
      const duration = 900;
      const start = performance.now();
      function tick(now){
        const p = Math.min((now - start) / duration, 1);
        const eased = 1 - Math.pow(1 - p, 3);
        const val = (end * eased).toFixed(decimals);
        el.textContent = prefix + val + suffix;
        if (p < 1) requestAnimationFrame(tick);
        else el.textContent = target;
      }
      requestAnimationFrame(tick);
    });
  }, { threshold: 0.4 });
  els.forEach(el=>countObserver.observe(el));
}

function initCardGlow(){
  document.querySelectorAll(".project-card, .lead-card").forEach(card=>{
    card.addEventListener("mousemove", (e)=>{
      const rect = card.getBoundingClientRect();
      card.style.setProperty("--mx", (e.clientX - rect.left) + "px");
      card.style.setProperty("--my", (e.clientY - rect.top) + "px");
    });
  });
}

function afterRender(){
  initReveal();
  initCountUp();
  initCardGlow();
}

    app.innerHTML = renderers[key] ? renderers[key]() : renderHome();
    updateActiveNav(key);
    window.scrollTo({ top: 0, behavior: "auto" });
    history.replaceState(null, "", "#" + key);
    requestAnimationFrame(()=>{ app.classList.remove("page-leaving"); afterRender(); });
  };
  if (app.innerHTML.trim()){
    app.classList.add("page-leaving");
    setTimeout(render, 180);
  } else {
    render();
  }
}

function goProject(slug){
  const app = document.getElementById("app");
  const render = ()=>{
    app.innerHTML = renderProjectDetail(slug);
    updateActiveNav("projects");
    window.scrollTo({ top: 0 });
    history.replaceState(null, "", "#projects/" + slug);
    requestAnimationFrame(()=>{ app.classList.remove("page-leaving"); afterRender(); });
  };
  app.classList.add("page-leaving");
  setTimeout(render, 180);
}

/* ---------------- INIT ---------------- */
renderNav();
applyThemeIcon();

(function initRoute(){
  const hash = window.location.hash.replace("#","");
  if (hash.startsWith("projects/")) {
    goProject(hash.split("/")[1]);
  } else if (renderers[hash]) {
    go(hash);
  } else {
    go("home");
  }
})();
</script>
